<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="bg.png" alt="" class="bg">
    <h1 style="color: rgb(255, 255, 255); text-shadow: 1px 2px 3px white;" >Online Pokedex</h1>

    <input type="text" id="PokemonName" placeholder="Enter Pokemon name" class="input">
    <button class="button" id="Sbtn">Search</button><br>

    <div id="pokemoninfo" class="pokemoninfo">
        <img id="img" src="" alt="" class="img" > 
        <p><b>Height:?</b></p>
        <p><b>Weight:?</b></p>
        <p><b>Types:?</b></p>
    </div>


    <script src="script.js"></script>

</body>
</html>
